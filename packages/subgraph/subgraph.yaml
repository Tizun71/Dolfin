specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DolfinAccountFactory
    network: arbitrum-sepolia
    source:
      address: "0x2D44cF1fD244a910Eb3Aafd0aF0C37B0284C0f96"
      abi: DolfinAccountFactory
      startBlock: 272654972
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SmartAccount
      abis:
        - name: DolfinAccountFactory
          file: ./abis/DolfinAccountFactory.json
      eventHandlers:
        - event: AccountCreated(indexed address,indexed address,uint256)
          handler: handleAccountCreated
      file: ./src/mapping.ts

  - kind: ethereum
    name: PolicyManager
    network: arbitrum-sepolia
    source:
      address: "0x6790d288B68BA06D01Ed3Bd33C421F29782B09e9"
      abi: PolicyManager
      startBlock: 272654950
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - PolicySnapshot
      abis:
        - name: PolicyManager
          file: ./abis/PolicyManager.json
      eventHandlers:
        - event: PolicySet(indexed address,indexed address,(uint48,uint128,uint128,uint128,uint128,uint16,uint16,bool,bool))
          handler: handlePolicySet
      file: ./src/mapping.ts

templates:
  - name: DolfinSmartAccount
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: DolfinSmartAccount
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SessionKey
        - Action
      abis:
        - name: DolfinSmartAccount
          file: ./abis/DolfinSmartAccount.json
      eventHandlers:
        - event: SessionKeyRegistered(indexed address,uint48)
          handler: handleSessionKeyRegistered
        - event: SessionKeyRevoked(indexed address)
          handler: handleSessionKeyRevoked
        - event: SessionKeyRotated(indexed address,indexed address,uint48)
          handler: handleSessionKeyRotated
        - event: ActionExecuted(indexed address,indexed address,uint8)
          handler: handleActionExecuted
      file: ./src/mapping.ts
